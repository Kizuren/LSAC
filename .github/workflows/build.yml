name: Build Release Assets

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-and-attach:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore solution
        run: dotnet restore LSAC.sln

      - name: Build solution
        run: dotnet build LSAC.sln -c Release --no-restore

      - name: Publish Windows asset
        run: dotnet publish LSAC/LSAC.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true -o artifacts/windows

      - name: Publish Linux asset
        run: dotnet publish LSAC/LSAC.csproj -c Release -r linux-x64 --self-contained true /p:PublishSingleFile=true -o artifacts/linux

      - name: Attach assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows/LSAC.exe
            artifacts/linux/LSAC
